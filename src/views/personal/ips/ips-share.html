<ons-page ng-controller="IPSShareController as vm">
    <generic-toolbar title="{{'IPS_FULL'|translate}}" style-class="fontSizeTitle"></generic-toolbar>

    <network-banner></network-banner>

    <div style="margin: 10px 10px 0; background-color: #e3e3e3; color: #6f6f6f" class="ips-badge">
        Note: non-dynamic demo data
    </div>

    <!-- TODO translate -->
    <div class="panel panel-default ips-outer-panel">
        <div class="panel-heading">
            <h3 class="panel-title">{{"SHARE"|translate}}</h3>
        </div>
        <div style="margin: 10px">
            <p>
                The following link and QR code provide direct viewing access to your patient summary for ? days.
                Protect them as you would a password, or your printed medical file.
            </p>
            <hr>
            <p>
                QR code:
            </p>
            <hr>
            <p>
                IPS Link: {{vm.ipsLink}}
            </p>
        </div>
    </div>
</ons-page>
