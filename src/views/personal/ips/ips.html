<ons-page ng-controller="IPSController as vm">
    <generic-toolbar title="{{'IPS_FULL'|translate}}" style-class="fontSizeTitle">
        <right-content>
            <ons-toolbar-button ng-click="vm.share()" id="buttonShareMaterial">
                <ons-icon icon="ion-android-share-alt" fixed-width="true"></ons-icon>
            </ons-toolbar-button>
        </right-content>
    </generic-toolbar>

    <network-banner></network-banner>

    <div style="margin: 10px; background-color: #e3e3e3; color: #6f6f6f" class="ips-badge">
        Note: non-dynamic demo data
    </div>

    <iframe style="height:92%; width:100%" ng-src="{{vm.ipsLink}}" title="IPS viewer"></iframe>
</ons-page>
